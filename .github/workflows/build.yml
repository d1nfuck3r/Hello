name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:        
          distribution: temurin
          java-version: 17
          # [แก้จุดที่ 1] เปิดแคชของ Java/Gradle เผื่อไว้
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        # [แก้จุดที่ 2] ตัวนี้ทีเด็ด! มันจะแคชพวก Gradle Wrapper (9.5.1) และ Dependencies ทุกอย่างให้เองโดยอัตโนมัติ ไม่ต้องใส่ Path เองเลย
      
      # 1. สร้างไฟล์ .jks กลับมาจาก Base64 ที่เราเก็บไว้ใน Secret
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/nahee.jks

      - name: Fix gradle wrapper
        run: |
          gradle wrapper --gradle-version 9.5.1
          chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # [แก้จุดที่ 3] ใช้ actions/cache เพื่อจำ Android SDK Platform 36 และ Build-tools 35
      - name: Cache Android SDK Components
        uses: actions/cache@v4
        id: cache-android-sdk
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platforms/android-36
            ${{ env.ANDROID_HOME }}/build-tools/35.0.0
          key: ${{ runner.os }}-android-sdk-36-35.0.0
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Install SDK components
        # ใส่เงื่อนไขว่า "ถ้ารอบก่อนแคชไว้แล้ว (Cache Hit) ไม่ต้องรันคำสั่งดาวน์โหลดนี้ซ้ำ"
        if: steps.cache-android-sdk.outputs.cache-hit != 'true'
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      
      
      # 3. แปลงร่างและ Sign แบบดั้งเดิม (ไม่ต้องง้อ Action สำเร็จรูป)
      - name: Sign APK (Native Method)
        run: |
          # เรียกใช้ zipalign จากโฟลเดอร์ 35 ที่เราโหลดไว้โดยตรง
          ${{ env.ANDROID_HOME }}/build-tools/35.0.0/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release-aligned.apk
          
          # ใช้ apksigner ยิงตรงเข้าไฟล์ .jks ที่เรา Decode ออกมา
          ${{ env.ANDROID_HOME }}/build-tools/35.0.0/apksigner sign --ks app/my-release-key.jks --ks-key-alias "${{ secrets.KEY_ALIAS }}" --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" --out app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release-aligned.apk

      # 4. เก็บไฟล์ที่ Sign เสร็จแล้วไว้บน GitHub Artifacts
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: HelloNotify-Sign
          path: app/build/outputs/apk/release/app-release-signed.apk
